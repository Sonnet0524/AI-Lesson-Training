<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="../templates/css/print.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>
<body>
    <!-- 封面页 -->
    <div class="cover-page">
        <div class="logo-container">
            <div class="logo-badge">
                <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#009944" />
                    <text x="50" y="55" text-anchor="middle" fill="white" font-size="16" font-weight="bold">SGCC</text>
                </svg>
            </div>
            <div class="logo-text">
                <div class="logo-main">国网四川电力</div>
                <div class="logo-sub">State Grid Sichuan Electric Power</div>
            </div>
        </div>
        <div class="cover-divider"></div>
        <h1 class="doc-title">{{title}}</h1>
        <h2 class="doc-subtitle">{{subtitle}}</h2>
        <div class="cover-meta">
            <div class="meta-item">
                <span class="meta-label">培训项目</span>
                <span class="meta-value">AI种子团队培训教材</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">课程阶段</span>
                <span class="meta-value">Day 1: Agentic AI 设计范式</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">生成日期</span>
                <span class="meta-value">{{date}}</span>
            </div>
        </div>
        <div class="cover-decoration">
            <div class="deco-line"></div>
            <div class="deco-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    
    <!-- 分页 -->
    <div class="page-break"></div>
    
    <!-- 目录页 -->
    <nav class="toc-page">
        <div class="toc-header">
            <h2 class="toc-title">目录</h2>
            <div class="toc-line"></div>
        </div>
        <div class="toc-content">
            {{toc}}
        </div>
    </nav>
    
    <!-- 分页 -->
    <div class="page-break"></div>
    
    <!-- 正文内容 -->
    <main class="content">
        {{content}}
    </main>
    
    <!-- 文档页脚 -->
    <footer class="document-footer">
        <div class="footer-content">
            <div class="footer-left">
                <span class="footer-logo">国网四川电力</span>
            </div>
            <div class="footer-center">
                <span>AI种子团队培训 · 内部资料</span>
            </div>
            <div class="footer-right">
                <span></span>
            </div>
        </div>
    </footer>
</body>
</html>
